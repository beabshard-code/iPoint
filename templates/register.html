{% extends 'base.html' %}
{% block title %}Регистрация — {{ BRAND }}{% endblock %}
{% block content %}
<div class="auth-wrap glass">
  <h1>Создать аккаунт</h1>
  <p class="sub">Присоединяйтесь к {{ BRAND }} и начните продавать.</p>
  <form method="post">
    <div class="form-group"><label>Имя</label><input type="text" name="name" required placeholder="Иван Петров"></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" required placeholder="you@example.com"></div>
    <div class="form-group"><label>Пароль</label><input type="password" name="password" required placeholder="Минимум 6 символов"></div>
    <button class="btn btn-primary btn-block" type="submit">Зарегистрироваться</button>
  </form>
  <p class="sub" style="margin-top:18px;text-align:center">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}" style="color:var(--c-action)">Войти</a></p>
</div>
{% endblock %}
